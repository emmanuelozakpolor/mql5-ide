    function highlightMQL5(code) {
      if (!code) return '\n';
      const out=[]; let i=0; const n=code.length;
      const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const sp=(c,s)=>`<span class="h${c}">${e(s)}</span>`;
      while(i<n){
        if(code[i]==='/'&&i+1<n&&code[i+1]==='/'){let j=i;while(j<n&&code[j]!=='\n')j++;out.push(sp('c',code.slice(i,j)));i=j;continue;}
        if(code[i]==='/'&&i+1<n&&code[i+1]==='*'){let j=i+2;while(j<n-1&&!(code[j]==='*'&&code[j+1]==='/'))j++;j=Math.min(j+2,n);out.push(sp('c',code.slice(i,j)));i=j;continue;}
        if(code[i]==='"'){let j=i+1;while(j<n&&code[j]!=='"'){if(code[j]==='\\')j++;j++;}out.push(sp('s',code.slice(i,Math.min(j+1,n))));i=Math.min(j+1,n);continue;}
        if(code[i]==="'"){let j=i+1;while(j<n&&code[j]!=="'"){if(code[j]==='\\')j++;j++;}out.push(sp('s',code.slice(i,Math.min(j+1,n))));i=Math.min(j+1,n);continue;}
        if(code[i]==='#'&&(i===0||code[i-1]==='\n')){let j=i;while(j<n&&code[j]!=='\n')j++;out.push(sp('p',code.slice(i,j)));i=j;continue;}
        if(/[0-9]/.test(code[i])||(code[i]==='.'&&i+1<n&&/[0-9]/.test(code[i+1]))){let j=i;while(j<n&&/[0-9.xXeEa-fA-FlLuU_]/.test(code[j]))j++;out.push(sp('n',code.slice(i,j)));i=j;continue;}
        if(/[a-zA-Z_]/.test(code[i])){let j=i;while(j<n&&/[a-zA-Z0-9_]/.test(code[j]))j++;const w=code.slice(i,j);out.push(sp(KW.has(w)?'k':TY.has(w)?'t':BT.has(w)?'b':'i',w));i=j;continue;}
        if(/[+\-*/%=<>!&|^~?:;,.\[\]{}()]/.test(code[i])){out.push(sp('o',code[i]));i++;continue;}
        out.push(e(code[i]));i++;
      }
      return out.join('')+'\n';
    }

void OnDeinit(const int reason)
  {
   if(g_maHandle != INVALID_HANDLE) IndicatorRelease(g_maHandle);
  }

void OnTick()
  {
   if(CopyBuffer(g_maHandle, 0, 0, 3, g_maBuffer) < 3) return;
   if(PositionsTotal() > 0) return;
   double ask   = SymbolInfoDouble(_Symbol, SYMBOL_ASK);
   double bid   = SymbolInfoDouble(_Symbol, SYMBOL_BID);
   double point = SymbolInfoDouble(_Symbol, SYMBOL_POINT);
   if(ask > g_maBuffer[0] && g_maBuffer[0] > g_maBuffer[1])
      OpenTrade(ORDER_TYPE_BUY, ask, ask-InpStopLoss*point, ask+InpTakeProfit*point);
   else if(bid < g_maBuffer[0] && g_maBuffer[0] < g_maBuffer[1])
      OpenTrade(ORDER_TYPE_SELL, bid, bid+InpStopLoss*point, bid-InpTakeProfit*point);
  }

void OpenTrade(ENUM_ORDER_TYPE type, double price, double sl, double tp)
  {
   MqlTradeRequest req = {};
   MqlTradeResult  res = {};
   req.action=TRADE_ACTION_DEAL; req.symbol=_Symbol; req.volume=InpLotSize;
   req.type=type; req.price=NormalizeDouble(price,_Digits);
   req.sl=NormalizeDouble(sl,_Digits); req.tp=NormalizeDouble(tp,_Digits);
   req.deviation=10; req.magic=100001; req.comment="SampleEA";
   if(!OrderSend(req,res)) Print("Error: ",GetLastError()," retcode: ",res.retcode);
   else Print("Order placed. Ticket: ",res.order);
  }

int OnCalculate(const int rates_total, const int prev_calculated,
                const datetime &time[], const double &open[],
                const double &high[], const double &low[], const double &close[],
                const long &tick_volume[], const long &volume[], const int &spread[])
  {
   int start = (prev_calculated > InpPeriod) ? prev_calculated-1 : InpPeriod;
   for(int i=start; i<rates_total; i++)
     {
      double sum=0, sum2=0;
      for(int j=0; j<InpPeriod; j++) { sum+=close[i-j]; sum2+=close[i-j]*close[i-j]; }
      double mean=sum/InpPeriod;
      double sd  =MathSqrt(sum2/InpPeriod - mean*mean);
      upperBuffer[i]=mean+InpDeviation*sd;
      lowerBuffer[i]=mean-InpDeviation*sd;
     }
   return rates_total;
  }

    /* ═══ SYNTAX CHECK ═══ */
    function syntaxCheck(code,filename){
      const lines=code.split('\n'),out=[];
      let braces=0,parens=0,inStr=false;
      for(let i=0;i<lines.length;i++){
        const ln=lines[i];
        for(let j=0;j<ln.length;j++){
          const c=ln[j];
          if(c==='"'&&(j===0||ln[j-1]!=='\\'))inStr=!inStr;
          if(inStr)continue;
          if(c==='{')braces++;
          if(c==='}'){braces--;if(braces<0)out.push({t:'error',m:`Line ${i+1}: Unexpected '}'`});}
          if(c==='(')parens++;
          if(c===')'){parens--;if(parens<-1)out.push({t:'error',m:`Line ${i+1}: Unexpected ')'`});}
        }
      }
      if(braces>0)out.push({t:'error',m:`Missing ${braces} closing brace(s) '}'`});
      if(parens>0)out.push({t:'error',m:`Missing ${parens} closing parenthesis`});
      if(!code.includes('OnInit'))out.push({t:'warn',m:'No OnInit() found'});
      if(!code.includes('OnTick')&&!code.includes('OnCalculate')&&!code.includes('OnStart'))
        out.push({t:'warn',m:'No OnTick/OnCalculate/OnStart found'});
      if(out.length===0)out.push({t:'ok',m:'✔ Local syntax check passed'});
      return out;
    }

      const lnRef=useRef(null);

      useEffect(()=>{
        const id=setTimeout(()=>lsSet({files,tabs,active,compileUrl,fontSize,showLN}),600);
        return()=>clearTimeout(id);
      },[files,tabs,active,compileUrl,fontSize,showLN]);

      const cur=files[active];
      const code=cur?.content||'';
      const highlighted=useMemo(()=>highlightMQL5(code),[code]);
      const lineCount=useMemo(()=>(code.match(/\n/g)||[]).length+1,[code]);
      const lineNums=useMemo(()=>Array.from({length:lineCount},(_,i)=>i+1).join('\n'),[lineCount]);

      const update=useCallback(v=>setFiles(p=>({...p,[active]:{...p[active],content:v,modified:true}})),[active]);
      const save=useCallback(()=>{
        setFiles(p=>({...p,[active]:{...p[active],modified:false}}));
        setOutput([{t:'ok',m:`✔ Saved: ${active}`}]); setOutputOpen(true);
      },[active]);

      const openTab=useCallback(f=>{setTabs(p=>p.includes(f)?p:[...p,f]);setActive(f);setSidebar(false);},[]);
      const closeTab=useCallback((f,e)=>{
        e?.stopPropagation();
        const next=tabs.filter(t=>t!==f); setTabs(next);
        if(active===f)setActive(next[next.length-1]??null);
      },[tabs,active]);

      const createFile=useCallback(()=>{
        const t=newName.trim(); if(!t)return;
        const isH=newTpl==='Include (.mqh)';
        const ext=t.includes('.')?'':isH?'.mqh':'.mq5';
        const fname=t+ext;
        const fpath=newTpl==='Expert Advisor'?'Experts/':newTpl==='Indicator'?'Indicators/':newTpl==='Script'?'Scripts/':'Include/';
        setFiles(p=>({...p,[fname]:{content:TEMPLATES[newTpl],path:fpath,modified:true}}));
        openTab(fname); setModal(null); setNewName('');
      },[newName,newTpl,openTab]);

      const deleteFile=useCallback(f=>{
        if(!window.confirm(`Delete ${f}?`))return;
        setFiles(p=>{const n={...p};delete n[f];return n;});
        closeTab(f,null);
      },[closeTab]);

      const compile=useCallback(async()=>{
        if(!cur)return;
        setCompiling(true); setOutputOpen(true);
        setOutput([{t:'info',m:`Compiling ${active}...`}]);
        if(!compileUrl.trim()){
          setOutput([
            {t:'warn',m:'⚠  No compile server set — showing local syntax check only.'},
            {t:'info',m:'→ Tap ⚙ Settings → Compile Server to connect your VPS.'},
            {t:'info',m:''},
            ...syntaxCheck(code,active),
          ]);
          setCompiling(false);return;
        }
        try{
          const r=await fetch(compileUrl.trim(),{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({filename:active,code,path:cur.path}),
          });
          const d=await r.json();
          const msgs=[];
          if(d.errors?.length)msgs.push(...d.errors.map(m=>({t:'error',m})));
          if(d.warnings?.length)msgs.push(...d.warnings.map(m=>({t:'warn',m})));
          msgs.push(d.success
            ?{t:'ok',  m:`✔ Compiled OK — ${d.errors?.length||0} errors, ${d.warnings?.length||0} warnings.`}
            :{t:'error',m:`✘ Failed — ${d.errors?.length||0} errors.`});
          setOutput(msgs);
        }catch(err){
          setOutput([{t:'error',m:`✘ Server error: ${err.message}`},{t:'info',m:'Check your VPS compile URL in Settings.'}]);
        }
        setCompiling(false);
      },[cur,active,code,compileUrl]);

      const doFind=useCallback(()=>{
        if(!taRef.current||!findStr)return;
        const hay=findCase?code:code.toLowerCase();
        const ndl=findCase?findStr:findStr.toLowerCase();
        const from=taRef.current.selectionEnd||0;
        let idx=hay.indexOf(ndl,from);if(idx<0)idx=hay.indexOf(ndl);
        if(idx>=0){taRef.current.focus();taRef.current.setSelectionRange(idx,idx+findStr.length);setFindOcc(null);}
        else setFindOcc('Not found');
      },[code,findStr,findCase]);

      const doReplaceAll=useCallback(()=>{
        if(!findStr)return;
        const esc=findStr.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        update(code.replace(new RegExp(esc,findCase?'g':'gi'),replStr));
      },[code,findStr,replStr,findCase,update]);

      const insertSnippet=useCallback(snip=>{
        const{s,e}=savedCursor;
        update(code.slice(0,s)+snip+code.slice(e));
        setModal(null);
        requestAnimationFrame(()=>{if(taRef.current){taRef.current.focus();taRef.current.setSelectionRange(s+snip.length,s+snip.length);}});
      },[code,savedCursor,update]);

      const handleKeyDown=useCallback(e=>{
        if(e.key==='Tab'){
          e.preventDefault();
          const ta=e.target,s=ta.selectionStart,en=ta.selectionEnd;
          update(code.slice(0,s)+'   '+code.slice(en));
          requestAnimationFrame(()=>{if(taRef.current){taRef.current.selectionStart=s+3;taRef.current.selectionEnd=s+3;}});
        }
        if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();save();}
        if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();setFindOpen(true);}
        if(e.key==='F7'){e.preventDefault();compile();}
      },[code,update,save,compile]);

      const onOuterScroll=useCallback(()=>{
        if(lnRef.current&&outerRef.current)lnRef.current.scrollTop=outerRef.current.scrollTop;
      },[]);

      const folders=useMemo(()=>{
        const m={};
        Object.entries(files).forEach(([n,f])=>{const fo=f.path||'Other/';if(!m[fo])m[fo]=[];m[fo].push(n);});
        return m;
      },[files]);

      const errCount=output.filter(o=>o.t==='error').length;
      const warnCount=output.filter(o=>o.t==='warn').length;
      const snipCats=['All',...new Set(SNIPPETS.map(s=>s.cat))];
      const visSnips=snippetCat==='All'?SNIPPETS:SNIPPETS.filter(s=>s.cat===snippetCat);
      const MONO="'Courier New','Consolas','Lucida Console',monospace";
      const copy=(text,label='Copied!')=>navigator.clipboard?.writeText(text).then(()=>{setCopyMsg(label);setTimeout(()=>setCopyMsg(''),2000);});

      return (
        <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'#1e1e1e',color:'#ccc',overflow:'hidden'}}>

          {/* ── TOOLBAR ── */}
          <div style={{display:'flex',alignItems:'center',gap:'4px',padding:'0 6px',height:'44px',flexShrink:0,background:'#2d2d2d',borderBottom:'1px solid #3a3a3a'}}>
            <button onClick={()=>setSidebar(p=>!p)} style={IB}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="2" y="3" width="8" height="18" rx="1"/><path d="M14 7h6M14 12h6M14 17h6"/>
              </svg>
            </button>
            <span style={{fontWeight:'800',fontSize:'12px',color:'#dcdcaa',letterSpacing:'2px',flex:1,paddingLeft:'2px'}}>MQL5 IDE</span>
            <button onClick={()=>{setSavedCursor({s:taRef.current?.selectionStart||0,e:taRef.current?.selectionEnd||0});setModal('snippets');}} style={IB}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
              </svg>
            </button>
            <button onClick={()=>setFindOpen(p=>!p)} style={IB}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </button>
            <button onClick={save} style={{...IB,color:'#9cdcfe'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>
            </button>
            <button onClick={compile} disabled={compiling||!active}
              style={{...IB,background:compiling?'transparent':'#0e639c',color:'#fff',borderRadius:'4px',padding:'5px 10px',fontSize:'12px',fontWeight:'700',gap:'5px',opacity:!active?0.4:1}}>
              {compiling
                ?<span style={{display:'inline-block',animation:'spin 1s linear infinite',fontSize:'15px'}}>⟳</span>
                :<><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Build</>
              }
            </button>
            <button onClick={()=>setModal('settings')} style={IB}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
            </button>
          </div>

          {/* ── TABS ── */}
          <div style={{display:'flex',alignItems:'stretch',flexShrink:0,background:'#252526',borderBottom:'1px solid #3a3a3a',overflowX:'auto',scrollbarWidth:'none',minHeight:'34px'}}>
            {tabs.map(tab=>{
              const isA=tab===active,ext=tab.split('.').pop();
              const ic=ext==='mq5'?'#dcdcaa':ext==='mqh'?'#4ec9b0':'#aaa';
              return(
                <div key={tab} onClick={()=>setActive(tab)}
                  style={{display:'flex',alignItems:'center',gap:'5px',padding:'0 10px',cursor:'pointer',flexShrink:0,borderRight:'1px solid #3a3a3a',fontSize:'12px',background:isA?'#1e1e1e':'transparent',borderBottom:isA?'2px solid #0078d4':'2px solid transparent',color:isA?'#fff':'#888',whiteSpace:'nowrap'}}>
                  <span style={{color:ic,fontSize:'11px'}}>{ext==='mq5'?'⚡':ext==='mqh'?'◈':'▶'}</span>
                  <span>{tab}</span>
                  {files[tab]?.modified&&<span style={{color:'#e9a73b',fontSize:'8px'}}>●</span>}
                  <span onClick={e=>closeTab(tab,e)} style={{color:'#555',cursor:'pointer',fontSize:'15px',marginLeft:'2px',lineHeight:1}}>×</span>
                </div>
              );
            })}
            <button onClick={()=>setModal('newFile')} style={{...IB,borderLeft:'1px solid #3a3a3a',borderRadius:0,padding:'0 12px',fontSize:'18px',flexShrink:0}}>+</button>
          </div>

          {/* ── BODY ── */}
          <div style={{display:'flex',flex:1,overflow:'hidden'}}>

            {/* Sidebar */}
            {sidebar&&(
              <div style={{width:'190px',flexShrink:0,background:'#252526',borderRight:'1px solid #3a3a3a',display:'flex',flexDirection:'column',overflow:'hidden'}}>
                <div style={{padding:'8px 10px',fontSize:'10px',color:'#666',fontWeight:'700',letterSpacing:'1.5px',borderBottom:'1px solid #3a3a3a',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  EXPLORER
                  <button onClick={()=>setModal('newFile')} style={{...IB,fontSize:'16px',padding:'1px 4px'}}>+</button>
                </div>
                <div style={{overflowY:'auto',flex:1}}>
                  {Object.entries(folders).map(([folder,fnames])=>(
                    <div key={folder}>
                      <div style={{padding:'6px 10px 2px',fontSize:'10px',color:'#666',fontWeight:'700',letterSpacing:'1px',display:'flex',alignItems:'center',gap:'4px'}}>
                        <span style={{fontSize:'9px'}}>▶</span>{folder}
                      </div>
                      {fnames.map(fn=>{
                        const ext=fn.split('.').pop();
                        const ic=ext==='mq5'?'#dcdcaa':ext==='mqh'?'#4ec9b0':'#aaa';
                        return(
                          <div key={fn} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 10px 4px 22px',cursor:'pointer',fontSize:'12px',background:active===fn?'#094771':'transparent',color:active===fn?'#fff':'#bbb'}}>
                            <span onClick={()=>openTab(fn)} style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',gap:'5px',alignItems:'center'}}>
                              <span style={{color:ic,fontSize:'10px'}}>{ext==='mq5'?'⚡':ext==='mqh'?'◈':'▶'}</span>
                              {fn}{files[fn]?.modified?' ●':''}
                            </span>
                            <button onClick={()=>deleteFile(fn)} style={{...IB,padding:'1px 3px',color:'#c66',fontSize:'12px',flexShrink:0}}>✕</button>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Editor column */}
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>

              {/* Find/Replace */}
              {findOpen&&(
                <div style={{background:'#2a2a2a',borderBottom:'1px solid #444',padding:'8px 10px',flexShrink:0,display:'flex',flexDirection:'column',gap:'6px'}}>
                  <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                    <input placeholder="Find…" value={findStr} onChange={e=>{setFindStr(e.target.value);setFindOcc(null);}} onKeyDown={e=>e.key==='Enter'&&doFind()} style={{...INP,flex:1,fontSize:'12px'}}/>
                    <label style={{fontSize:'11px',color:'#aaa',display:'flex',alignItems:'center',gap:'3px',flexShrink:0}}>
                      <input type="checkbox" checked={findCase} onChange={e=>setFindCase(e.target.checked)}/> Aa
                    </label>
                    <button onClick={doFind} style={SB}>Find</button>
                    <button onClick={()=>setFindOpen(false)} style={IB}>✕</button>
                  </div>
                  <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                    <input placeholder="Replace…" value={replStr} onChange={e=>setReplStr(e.target.value)} style={{...INP,flex:1,fontSize:'12px'}}/>
                    <button onClick={doReplaceAll} style={SB}>Replace All</button>
                    {findOcc&&<span style={{fontSize:'11px',color:'#f14c4c'}}>{findOcc}</span>}
                  </div>
                </div>
              )}

              {/* Code editor */}
              {active&&cur?(
                <div style={{flex:1,display:'flex',overflow:'hidden'}}>
                  {showLN&&(
                    <div ref={lnRef} style={{overflow:'hidden',background:'#1e1e1e',borderRight:'1px solid #2a2a2a',flexShrink:0,minWidth:'40px',textAlign:'right'}}>
                      <pre style={{margin:0,padding:'12px 8px 12px 4px',fontFamily:MONO,fontSize:fontSize+'px',lineHeight:'1.5',color:'#454545',whiteSpace:'pre',userSelect:'none'}}>{lineNums}</pre>
                    </div>
                  )}
                  <div ref={outerRef} onScroll={onOuterScroll} style={{flex:1,overflow:'auto',position:'relative',background:'#1e1e1e'}}>
                    <div style={{position:'relative',display:'inline-block',minWidth:'100%'}}>
                      <pre dangerouslySetInnerHTML={{__html:highlighted}}
                        style={{margin:0,padding:'12px',fontFamily:MONO,fontSize:fontSize+'px',lineHeight:'1.5',whiteSpace:'pre',pointerEvents:'none',color:'#d4d4d4',minWidth:'100%',tabSize:3}}/>
                      <textarea ref={taRef} value={code} onChange={e=>update(e.target.value)} onKeyDown={handleKeyDown}
                        spellCheck={false} autoCorrect="off" autoCapitalize="off" autoComplete="off"
                        style={{position:'absolute',top:0,left:0,right:0,bottom:0,width:'100%',height:'100%',fontFamily:MONO,fontSize:fontSize+'px',lineHeight:'1.5',padding:'12px',margin:0,background:'transparent',color:'transparent',caretColor:'#aeafad',border:'none',outline:'none',resize:'none',overflow:'hidden',whiteSpace:'pre',WebkitTextFillColor:'transparent',boxSizing:'border-box',tabSize:3}}/>
                    </div>
                  </div>
                </div>
              ):(
                <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'16px',background:'#1e1e1e'}}>
                  <div style={{fontSize:'52px',opacity:.3}}>⚡</div>
                  <div style={{fontSize:'15px',fontWeight:'700',color:'#555',letterSpacing:'2px'}}>MQL5 MOBILE IDE</div>
                  <div style={{fontSize:'12px',color:'#404040',textAlign:'center',lineHeight:'1.8'}}>Open a file from the Explorer<br/>or create a new one</div>
                  <button onClick={()=>setModal('newFile')} style={{background:'#0e639c',color:'#fff',border:'none',padding:'10px 22px',borderRadius:'5px',cursor:'pointer',fontSize:'13px',fontWeight:'700',letterSpacing:'1px'}}>+ NEW FILE</button>
                </div>
              )}

              {/* Output */}
              <div style={{background:'#1a1a1a',borderTop:'1px solid #3a3a3a',flexShrink:0,display:'flex',flexDirection:'column',maxHeight:outputOpen?'160px':'30px',transition:'max-height 0.15s ease'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'0 8px',height:'30px',flexShrink:0,background:'#252526',cursor:'pointer'}} onClick={()=>setOutputOpen(p=>!p)}>
                  <span style={{fontSize:'10px',fontWeight:'700',color:'#555',letterSpacing:'1.5px'}}>OUTPUT</span>
                  {errCount>0&&<span style={{fontSize:'11px',color:'#f14c4c'}}>✘ {errCount} error{errCount>1?'s':''}</span>}
                  {warnCount>0&&<span style={{fontSize:'11px',color:'#cca700'}}>⚠ {warnCount}</span>}
                  {errCount===0&&warnCount===0&&output.some(o=>o.t==='ok')&&<span style={{fontSize:'11px',color:'#4ec9b0'}}>✔ OK</span>}
                  <span style={{marginLeft:'auto',color:'#555',fontSize:'13px'}}>{outputOpen?'▼':'▲'}</span>
                  <button onClick={e=>{e.stopPropagation();setOutput([]);}} style={{...IB,fontSize:'10px',color:'#555'}}>Clear</button>
                </div>
                {outputOpen&&(
                  <div style={{overflowY:'auto',flex:1,padding:'4px 10px 6px'}}>
                    {output.length===0
                      ?<div style={{fontSize:'11px',color:'#3a3a3a',padding:'3px 0'}}>No output</div>
                      :output.map((o,i)=>(
                        <div key={i} style={{fontSize:'11px',lineHeight:'1.7',fontFamily:MONO,color:o.t==='error'?'#f14c4c':o.t==='warn'?'#cca700':o.t==='ok'?'#4ec9b0':'#555'}}>
                          {o.m||'\u00a0'}
                        </div>
                      ))
                    }
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Status bar */}
          <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'0 10px',height:'20px',minHeight:'20px',flexShrink:0,background:'#007acc',color:'rgba(255,255,255,0.9)',fontSize:'11px',userSelect:'none'}}>
            {active
              ?<><span style={{opacity:.85}}>⚡ {cur?.path||''}{active}</span><span style={{marginLeft:'auto'}}>Ln {lineCount}</span><span>MQL5</span><span>UTF-8</span>{cur?.modified&&<span style={{opacity:.7}}>● Modified</span>}</>
              :<span style={{opacity:.6}}>MQL5 Mobile IDE — Ready</span>
            }
          </div>

          {/* ── MODALS ── */}
          {modal&&(
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:'16px'}} onClick={()=>{setModal(null);setShowVps(false);}}>
              <div style={{background:'#252526',border:'1px solid #454545',borderRadius:'8px',padding:'20px',width:'100%',maxWidth:'380px',maxHeight:'88vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:'12px'}} onClick={e=>e.stopPropagation()}>

                {modal==='newFile'&&<>
                  <div style={MH}>New File</div>
                  <div>
                    <label style={ML}>File Name</label>
                    <input placeholder="MyEA" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createFile()} style={{...INP,width:'100%'}} autoFocus/>
                    <div style={{fontSize:'10px',color:'#555',marginTop:'3px'}}>Extension auto-added (.mq5 / .mqh)</div>
                  </div>
                  <div>
                    <label style={ML}>Template</label>
                    <select value={newTpl} onChange={e=>setNewTpl(e.target.value)} style={{...INP,width:'100%'}}>
                      {Object.keys(TEMPLATES).map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                    <button onClick={()=>setModal(null)} style={CB}>Cancel</button>
                    <button onClick={createFile} style={PB}>Create</button>
                  </div>
                </>}

                {modal==='settings'&&<>
                  <div style={MH}>Settings</div>
                  <div>
                    <label style={ML}>Font Size: {fontSize}px</label>
                    <input type="range" min="10" max="22" value={fontSize} onChange={e=>setFontSize(Number(e.target.value))} style={{width:'100%',accentColor:'#0078d4'}}/>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#555'}}><span>10</span><span>22</span></div>
                  </div>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'13px',color:'#bbb',cursor:'pointer'}}>
                    <input type="checkbox" checked={showLN} onChange={e=>setShowLN(e.target.checked)} style={{accentColor:'#0078d4',width:'14px',height:'14px'}}/>
                    Show Line Numbers
                  </label>
                  <div style={{borderTop:'1px solid #3a3a3a',paddingTop:'12px'}}>
                    <label style={{...ML,color:'#4ec9b0',fontWeight:'600'}}>⚡ Compile Server (VPS)</label>
                    <input placeholder="http://your-vps-ip:5000/compile" value={compileUrl} onChange={e=>setCompileUrl(e.target.value)} style={{...INP,width:'100%',marginBottom:'8px'}}/>
                    <div style={{background:'#1a1a2a',border:'1px solid #3a3a4a',borderRadius:'6px',padding:'10px',fontSize:'11px',color:'#666',lineHeight:'1.75'}}>
                      <div style={{color:'#dcdcaa',fontWeight:'700',marginBottom:'4px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        VPS Setup
                        <button onClick={()=>setShowVps(v=>!v)} style={{...IB,fontSize:'10px',color:'#888'}}>{showVps?'Hide':'Show'} code</button>
                      </div>
                      <div>1. <span style={{color:'#4ec9b0'}}>pip install flask flask-cors</span></div>
                      <div>2. Create <span style={{color:'#9cdcfe'}}>compile_server.py</span> on VPS</div>
                      <div>3. URL → <span style={{color:'#9cdcfe'}}>http://VPS_IP:5000/compile</span></div>
                      {showVps&&(
                        <div style={{marginTop:'10px',position:'relative'}}>
                          <button onClick={()=>copy(VPS_CODE,'Copied!')} style={{...SB,position:'absolute',top:'6px',right:'6px',fontSize:'10px',padding:'3px 8px',zIndex:1}}>{copyMsg||'Copy'}</button>
                          <pre style={{background:'#111',borderRadius:'4px',padding:'10px',fontSize:'10px',color:'#9cdcfe',overflowX:'auto',margin:0,lineHeight:'1.6',whiteSpace:'pre'}}>{VPS_CODE}</pre>
                        </div>
                      )}
                    </div>
                  </div>
                  <div style={{display:'flex',justifyContent:'flex-end'}}><button onClick={()=>setModal(null)} style={PB}>Done</button></div>
                </>}

                {modal==='snippets'&&<>
                  <div style={MH}>Code Snippets</div>
                  <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
                    {snipCats.map(c=>(
                      <button key={c} onClick={()=>setSnippetCat(c)} style={{background:snippetCat===c?'#0e639c':'#3c3c3c',color:snippetCat===c?'#fff':'#999',border:'none',borderRadius:'3px',padding:'3px 10px',fontSize:'11px',cursor:'pointer'}}>{c}</button>
                    ))}
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    {visSnips.map((s,i)=>(
                      <button key={i} onClick={()=>insertSnippet(s.code)}
                        style={{background:'#2d2d2d',border:'1px solid #3d3d3d',color:'#ccc',padding:'9px 12px',borderRadius:'5px',cursor:'pointer',fontSize:'12px',textAlign:'left',display:'flex',alignItems:'center',gap:'8px'}}>
                        <span style={{color:'#dcdcaa',fontSize:'10px'}}>{s.cat==='Trading'?'📈':s.cat==='Debug'?'🐞':s.cat==='Files'?'📁':s.cat==='Alerts'?'🔔':'◈'}</span>
                        <span style={{flex:1}}>{s.label}</span>
                        <span style={{fontSize:'10px',color:'#555'}}>{s.cat}</span>
                      </button>
                    ))}
                  </div>
                  <button onClick={()=>setModal(null)} style={CB}>Close</button>
                </>}
              </div>
            </div>
          )}

          <style>{`
            .hk{color:#569cd6}.ht{color:#4ec9b0}.hb{color:#dcdcaa}
            .hs{color:#ce9178}.hn{color:#b5cea8}.hc{color:#6a9955;font-style:italic}
            .hp{color:#c586c0}.hi{color:#9cdcfe}.ho{color:#d4d4d4}
            textarea{-webkit-text-fill-color:transparent!important}
            button:active{opacity:0.75}
          `}</style>
        </div>
      );
    }

    /* ═══ SHARED STYLES ═══ */
    const IB={background:'transparent',border:'none',color:'#aaa',cursor:'pointer',padding:'5px',borderRadius:'3px',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'4px',flexShrink:0};
    const SB={background:'#0e639c',color:'#fff',border:'none',padding:'5px 10px',borderRadius:'3px',cursor:'pointer',fontSize:'11px',fontWeight:'600',flexShrink:0};
    const INP={background:'#3c3c3c',border:'1px solid #555',color:'#ccc',padding:'7px 9px',borderRadius:'4px',fontSize:'13px',outline:'none'};
    const MH={fontSize:'14px',fontWeight:'700',color:'#fff',marginBottom:'2px'};
    const ML={display:'block',fontSize:'11px',color:'#777',marginBottom:'4px'};
    const PB={background:'#0e639c',color:'#fff',border:'none',padding:'8px 18px',borderRadius:'4px',cursor:'pointer',fontSize:'13px',fontWeight:'600'};
    const CB={background:'transparent',color:'#aaa',border:'1px solid #4a4a4a',padding:'8px 18px',borderRadius:'4px',cursor:'pointer',fontSize:'13px'};

    /* ═══ MOUNT ═══ */
    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
    // Hide splash
    const splash=document.getElementById('splash');
    if(splash){splash.style.opacity='0';setTimeout(()=>splash.remove(),350);}
  </script>

  <script>
    // ── PWA Manifest (injected dynamically so it works from a file:// or any URL) ──
    const manifest={
      name:'MQL5 Mobile IDE',short_name:'MQL5 IDE',
      description:'Mobile MetaEditor for MQL5 — edit and compile on the go',
      theme_color:'#007acc',background_color:'#1e1e1e',
      display:'standalone',orientation:'any',start_url:'.',
      icons:[{
        src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%231e1e1e'/%3E%3Cpolygon points='290,70 170,275 252,275 224,445 342,237 260,237' fill='%23dcdcaa'/%3E%3Crect x='40' y='440' width='432' height='12' rx='6' fill='%23007acc'/%3E%3C/svg%3E",
        sizes:'512x512',type:'image/svg+xml'
      }]
    };
    const ml=document.createElement('link');
    ml.rel='manifest';
    ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));
    document.head.appendChild(ml);

    // ── Register service worker for offline use (only works on HTTPS or localhost) ──
    if('serviceWorker' in navigator && location.protocol!=='file:'){
      const sw=`
        const CACHE='mql5-ide-v1';
        const ASSETS=['/'];
        self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));self.skipWaiting();});
        self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));});
        self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});
      `;
      const blob=new Blob([sw],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob))
        .then(()=>console.log('SW registered — app works offline'))
        .catch(()=>{});
    }
  </script>
</body>
